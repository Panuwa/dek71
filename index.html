            eng: ["Vocabulary (3000 คำ)", "Reading: Advertisements/News", "Reading: Articles/Research", "Conversation: Daily life", "Conversation: Situational", "Grammar & Structure", "Writing: Paragraph Organization"],
            thai: ["หลักการใช้ภาษาไทย", "การอ่านจับใจความ", "การเขียนเพื่อการสื่อสาร", "วรรณคดีวิจารณ์"],

        const Icons = {

            Book: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
            Brain: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
            Close: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Edit: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            Trophy: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10"/><path d="M17 4v6a5 5 0 1 1-10 0V4"/><line x1="7" y1="9" x2="17" y2="9"/></svg>,

            Clock: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        };

        // --- COMPONENTS ---
        
        // Simple SVG Line Chart Component
        const ScoreChart = ({ history, targetScore }) => {
            if (!history || history.length < 2) return (
                <div className="flex flex-col items-center justify-center h-32 bg-gray-50 rounded-lg border border-dashed border-gray-200 text-gray-400 text-xs">
                    <Icons.Trophy />
                    <span className="mt-2">บันทึกคะแนนอย่างน้อย 2 ครั้งเพื่อดูกราฟแนวโน้ม</span>
                </div>
            );

            const height = 120;
            const width = 500;
            const padding = 20;
            const maxScore = 100;

            // X axis calculations
            const xStep = (width - padding * 2) / (history.length - 1);
            
            // Generate points
            const points = history.map((entry, index) => {
                const x = padding + index * xStep;
                const y = height - padding - (entry.score / maxScore) * (height - padding * 2);
                return `${x},${y}`;
            }).join(' ');

            // Generate Target Line
            const targetY = height - padding - (targetScore / maxScore) * (height - padding * 2);

            return (
                <div className="w-full overflow-hidden mb-6">
                    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full bg-white rounded-lg border border-gray-100 shadow-sm">
                        {/* Grid Lines */}
                        <line x1={padding} y1={height-padding} x2={width-padding} y2={height-padding} stroke="#e5e7eb" strokeWidth="1" />
                        <line x1={padding} y1={padding} x2={width-padding} y2={padding} stroke="#e5e7eb" strokeWidth="1" strokeDasharray="4" />
                        
                        {/* Target Line */}
                        {targetScore > 0 && (
                             <line x1={padding} y1={targetY} x2={width-padding} y2={targetY} stroke="#10b981" strokeWidth="1" strokeDasharray="4" opacity="0.5" />
                        )}

                        {/* Chart Line */}
                        <polyline points={points} fill="none" stroke="#4f46e5" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                        
                        {/* Data Points */}
                        {history.map((entry, index) => {
                            const x = padding + index * xStep;
                            const y = height - padding - (entry.score / maxScore) * (height - padding * 2);
                            return (
                                <g key={index}>
                                    <circle cx={x} cy={y} r="4" fill="#fff" stroke="#4f46e5" strokeWidth="2" />
                                    <text x={x} y={y - 10} textAnchor="middle" fontSize="10" fill="#6b7280">{entry.score}</text>
                                    <text x={x} y={height - 5} textAnchor="middle" fontSize="8" fill="#9ca3af">{new Date(entry.date).toLocaleDateString('th-TH', {day:'numeric', month:'short'})}</text>
                                </g>
                            );
                        })}
                    </svg>
                    <div className="flex justify-between text-[10px] text-gray-400 mt-1 px-2">
                        <span>Start</span>
                        <div className="flex items-center gap-2">
                            <span className="flex items-center gap-1"><div className="w-2 h-0.5 bg-green-500"></div> Target ({targetScore})</span>
                            <span className="flex items-center gap-1"><div className="w-2 h-0.5 bg-indigo-500"></div> Score</span>
                        </div>
                        <span>Latest</span>
                    </div>
                </div>
            );
        };

        const SubjectModal = ({ subject, onClose, onUpdateTopic, onAddScore, onDeleteScore, onUpdateTarget }) => {
            if (!subject) return null;
            
            // State for new score input
            const [newScore, setNewScore] = React.useState('');
            const [newDate, setNewDate] = React.useState(new Date().toISOString().split('T')[0]);

            const handleAddScore = () => {
                if (newScore === '') return;
                onAddScore(subject.id, parseInt(newScore), newDate);
                setNewScore('');
            };

            const latestScore = subject.scoreHistory && subject.scoreHistory.length > 0 
                ? subject.scoreHistory[subject.scoreHistory.length - 1].score 
                : 0;

            const scoreGap = subject.targetScore - latestScore;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[90vh] shadow-2xl z-10 flex flex-col slide-up overflow-hidden">
                        
                        <div className={`p-6 ${subject.color} bg-opacity-10 border-b border-gray-100 flex justify-between items-start`}>
                            <div className="flex gap-4">
                                <div className={`p-3 rounded-xl ${subject.color} text-white shadow-sm`}>
                                    {subject.icon === 'Target' ? <Icons.Target /> : subject.icon === 'Brain' ? <Icons.Brain /> : <Icons.Book />}
                                </div>
                                <div>
                                    <h2 className="text-2xl font-bold text-gray-800">{subject.name}</h2>
                                    <p className="text-sm text-gray-500 font-medium">Weight: {subject.weight}% • Progress: {subject.progress}%</p>
                                </div>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-400 hover:text-gray-600">
                                <Icons.Close />
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto p-6 scrollbar-hide">
                            <div className="mb-8 bg-gray-50 rounded-xl p-5 border border-gray-100">
                                <h3 className="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                                    <Icons.Trophy /> Test Performance & Trend
                                </h3>

                                {/* 1. GRAPH */}
                                <ScoreChart history={subject.scoreHistory} targetScore={subject.targetScore} />

                                {/* 2. INPUTS */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                    <div className="bg-white p-4 rounded-lg border border-gray-200">
                                        <label className="text-xs text-gray-500 mb-2 block font-bold">🎯 ตั้งเป้าหมาย (Target Score)</label>
                                        <div className="flex items-center gap-2">
                                            <input 
                                                type="number" 
                                                value={subject.targetScore || ''} 
                                                onChange={(e) => onUpdateTarget(subject.id, e.target.value)}
                                                className="w-full font-bold text-indigo-600 bg-gray-50 border border-gray-200 rounded p-2 focus:ring-1 focus:ring-indigo-500"
                                                placeholder="60"
                                            />
                                            <span className="text-xs text-gray-400">/100</span>
                                        </div>
                                    </div>
                                    <div className="bg-white p-4 rounded-lg border border-gray-200">
                                        <label className="text-xs text-gray-500 mb-2 block font-bold">📝 เพิ่มคะแนนสอบใหม่ (New Test)</label>
                                        <div className="flex gap-2">
                                            <input 
                                                type="date" 
                                                value={newDate}
                                                onChange={(e) => setNewDate(e.target.value)}
                                                className="w-1/3 text-xs border border-gray-200 rounded p-2 bg-gray-50"
                                            />
                                            <input 
                                                type="number" 
                                                value={newScore}
                                                onChange={(e) => setNewScore(e.target.value)}
                                                className="w-1/3 text-sm border border-gray-200 rounded p-2 focus:ring-1 focus:ring-green-500"
                                                placeholder="Score"
                                            />
                                            <button 
                                                onClick={handleAddScore}
                                                className="flex-1 bg-gray-800 text-white text-xs rounded hover:bg-gray-900 flex items-center justify-center gap-1"
                                            >
                                                <Icons.Plus /> Add
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {/* 3. HISTORY LOG */}
                                <div>
                                    <h4 className="text-xs font-bold text-gray-400 mb-2">History Log</h4>
                                    <div className="max-h-32 overflow-y-auto border border-gray-100 rounded-lg bg-white">
                                        {(!subject.scoreHistory || subject.scoreHistory.length === 0) ? (
                                            <div className="p-3 text-xs text-gray-400 text-center">ยังไม่มีประวัติการสอบ</div>
                                        ) : (
                                            <table className="w-full text-xs text-left">
                                                <thead className="bg-gray-50 text-gray-500">
                                                    <tr>
                                                        <th className="p-2">Date</th>
                                                        <th className="p-2">Score</th>
                                                        <th className="p-2 text-right">Action</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {[...subject.scoreHistory].reverse().map((entry, idx) => (
                                                        <tr key={idx} className="border-t border-gray-50 hover:bg-gray-50">
                                                            <td className="p-2 text-gray-600">{new Date(entry.date).toLocaleDateString('th-TH')}</td>
                                                            <td className="p-2 font-bold text-gray-800">{entry.score}</td>
                                                            <td className="p-2 text-right">
                                                                <button 
                                                                    onClick={() => onDeleteScore(subject.id, (subject.scoreHistory.length - 1) - idx)}
                                                                    className="text-gray-300 hover:text-red-500"
                                                                >
                                                                    <Icons.Trash />
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        )}
                                    </div>
                                </div>
                            </div>

                            <div>
                                <h3 className="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4">
                                    Topic Checklist
                                </h3>
                                <div className="space-y-3">
                                    {subject.topics.map((topic, index) => (
                                        <label key={index} className="flex items-center p-3 rounded-lg border border-gray-100 hover:bg-gray-50 hover:border-gray-200 cursor-pointer transition-all group">
                                            <div className="relative flex items-center">
                                                <input 
                                                    type="checkbox" 
                                                    checked={topic.completed} 
                                                    onChange={() => onUpdateTopic(subject.id, index)}
                                                    className="peer h-6 w-6 cursor-pointer appearance-none rounded-md border-2 border-gray-300 transition-all checked:border-green-500 checked:bg-green-500 hover:border-indigo-400"
                                                />
                                                <div className="pointer-events-none absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-white opacity-0 peer-checked:opacity-100">
                                                    <Icons.Check />
                                                </div>
                                            </div>
                                            <span className={`ml-3 text-sm transition-colors ${topic.completed ? 'text-gray-400 line-through' : 'text-gray-700 font-medium'}`}>
                                                {topic.name}
                                            </span>
                                        </label>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="p-4 border-t border-gray-100 bg-gray-50 text-right">
                            <button onClick={onClose} className="px-6 py-2 bg-gray-800 text-white rounded-lg hover:bg-gray-900 font-medium text-sm">
                                ปิดหน้าต่าง
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const Dek71Dashboard = () => {
            const [subjects, setSubjects] = React.useState([]);
            const [totalReadiness, setTotalReadiness] = React.useState(0);
            const [averageScore, setAverageScore] = React.useState(0);
            const [selectedSubject, setSelectedSubject] = React.useState(null);
            
            // Exam Date State
            const [examDateStr, setExamDateStr] = React.useState('2028-03-15');
            const [timeLeft, setTimeLeft] = React.useState({ days: 0, hours: 0 });
            const [isEditingDate, setIsEditingDate] = React.useState(false);

            // Initial Data Structure
            const createInitialData = () => {
                return [
                    { id: 'tpat1', name: 'TPAT1 (กสพท)', weight: 30, color: 'bg-orange-500', icon: 'Brain', targetScore: 200 },
                    { id: 'math1', name: 'คณิตศาสตร์ 1', weight: 14, color: 'bg-blue-600', icon: 'Target', targetScore: 50 },
                    { id: 'phy', name: 'ฟิสิกส์', weight: 9.33, color: 'bg-indigo-500', icon: 'Book', targetScore: 45 },
                    { id: 'chem', name: 'เคมี', weight: 9.33, color: 'bg-teal-500', icon: 'Book', targetScore: 50 },
                    { id: 'bio', name: 'ชีววิทยา', weight: 9.33, color: 'bg-green-500', icon: 'Book', targetScore: 60 },
                    { id: 'eng', name: 'ภาษาอังกฤษ', weight: 14, color: 'bg-purple-600', icon: 'Book', targetScore: 70 },
                    { id: 'thai', name: 'ภาษาไทย', weight: 7, color: 'bg-pink-500', icon: 'Book', targetScore: 70 },
                    { id: 'soc', name: 'สังคมศึกษา', weight: 7, color: 'bg-yellow-500', icon: 'Book', targetScore: 60 },
                ].map(sub => ({
                    ...sub,
                    progress: 0,
                    lastUpdated: null,
                    scoreHistory: [], // New Field for array of scores
                    topics: MASTER_CURRICULUM[sub.id] ? MASTER_CURRICULUM[sub.id].map(topic => ({ name: topic, completed: false })) : []
                }));
            };

            // Load & Migrate Data
            React.useEffect(() => {
                try {
                    const savedData = localStorage.getItem('dek71_deepdive_data');
                    const savedDate = localStorage.getItem('dek71_exam_date');
                    if (savedDate) setExamDateStr(savedDate);
                    
                    if (savedData) {
                        const parsed = JSON.parse(savedData);
                        // Migration Check: If data format is old (has currentScore but no scoreHistory)
                        const migratedData = parsed.map(sub => {
                            // If scoreHistory missing but currentScore exists, convert it
                            if (!sub.scoreHistory) {
                                sub.scoreHistory = sub.currentScore > 0 
                                    ? [{ date: new Date().toISOString(), score: sub.currentScore }] 
                                    : [];
                            }
                            return sub;
                        });
                        setSubjects(migratedData);
                    } else {
                        setSubjects(createInitialData());
                    }
                } catch (e) {
                    console.error("Error loading data:", e);
                    setSubjects(createInitialData());
                }
            }, []);

            // Countdown Logic
            React.useEffect(() => {
                const timer = setInterval(() => {
                    const examDate = new Date(examDateStr + 'T00:00:00');
                    const now = new Date();
                    const difference = examDate - now;
                    const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((difference / (1000 * 60 * 60)) % 24);
                    setTimeLeft({ days, hours });
                }, 1000);
                return () => clearInterval(timer);
            }, [examDateStr]);

            const handleDateChange = (e) => {
                const newDate = e.target.value;
                setExamDateStr(newDate);
                localStorage.setItem('dek71_exam_date', newDate);
                setIsEditingDate(false);
            };

            // Auto-Save & Calculations
            React.useEffect(() => {
                if (subjects.length > 0) {
                    localStorage.setItem('dek71_deepdive_data', JSON.stringify(subjects));
                    
                    // 1. Weighted Readiness
                    const weightedScore = subjects.reduce((acc, sub) => acc + (sub.progress * sub.weight / 100), 0);
                    setTotalReadiness(weightedScore);

                    // 2. Average Latest Score
                    const subjectsWithScore = subjects.filter(s => s.scoreHistory && s.scoreHistory.length > 0);
                    if (subjectsWithScore.length > 0) {
                        const sumLatest = subjectsWithScore.reduce((acc, s) => acc + s.scoreHistory[s.scoreHistory.length-1].score, 0);
                        setAverageScore(sumLatest / subjectsWithScore.length);
                    } else {
                        setAverageScore(0);
                    }
                }
            }, [subjects]);

            // Helper to get latest score safely
            const getLatestScore = (subject) => {
                if (subject.scoreHistory && subject.scoreHistory.length > 0) {
                    return subject.scoreHistory[subject.scoreHistory.length - 1].score;
                }
                return 0;
            };

            const updateSubjectState = (subjectId, updaterFn) => {
                setSubjects(prev => prev.map(sub => {
                    if (sub.id !== subjectId) return sub;
                    const updatedSub = updaterFn(sub);
                    updatedSub.lastUpdated = new Date().toISOString();
                    
                    if (selectedSubject && selectedSubject.id === subjectId) {
                        setSelectedSubject(updatedSub);
                    }
                    return updatedSub;
                }));
            };

            const handleUpdateTopic = (subjectId, topicIndex) => {
                updateSubjectState(subjectId, (sub) => {
                    const newTopics = sub.topics.map((topic, i) => 
                        i === topicIndex ? { ...topic, completed: !topic.completed } : topic
                    );
                    const completedCount = newTopics.filter(t => t.completed).length;
                    const newProgress = Math.round((completedCount / newTopics.length) * 100);
                    return { ...sub, topics: newTopics, progress: newProgress };
                });
            };

            const handleAddScore = (subjectId, score, date) => {
                updateSubjectState(subjectId, (sub) => {
                    const newHistory = [...(sub.scoreHistory || []), { score, date }];
                    return { ...sub, scoreHistory: newHistory };
                });
            };

            const handleDeleteScore = (subjectId, index) => {
                 updateSubjectState(subjectId, (sub) => {
                    const newHistory = [...sub.scoreHistory];
                    newHistory.splice(index, 1);
                    return { ...sub, scoreHistory: newHistory };
                });
            };

            const handleUpdateTarget = (subjectId, val) => {
                updateSubjectState(subjectId, (sub) => {
                     const numValue = val === '' ? 0 : parseInt(val);
                     return { ...sub, targetScore: numValue };
                });
            };

            const handleReset = () => {
                if (confirm('ยืนยันรีเซ็ตข้อมูลทั้งหมด?')) {
                    const freshData = createInitialData();
                    setSubjects(freshData);
                    localStorage.removeItem('dek71_deepdive_data');
                }
            };

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8 min-h-screen">
                    <header className="mb-8">
                        {/* Top Bar */}
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-6">
                            <div>
                                <h1 className="text-3xl font-bold text-gray-800 flex items-center gap-2">
                                    <span className="bg-indigo-600 text-white p-2 rounded-lg"><Icons.Target /></span>
                                    Dek71 Tracker
                                </h1>
                                <p className="text-gray-500 mt-1 ml-1 text-sm">Deep Dive Dashboard (v2.3 Analytics)</p>
                            </div>

                            {/* Countdown Widget */}
                            <div className="bg-white px-4 py-2 rounded-xl shadow-sm border border-gray-100 flex items-center gap-4">
                                <div>
                                    <div className="text-xs text-gray-400 font-bold uppercase tracking-wider">Countdown To Exam</div>
                                    <div className="text-xl font-bold text-indigo-700 flex items-center gap-2">
                                        <Icons.Clock />
                                        {timeLeft.days} วัน {timeLeft.hours} ชม.
                                    </div>
                                    {isEditingDate ? (
                                        <input 
                                            type="date" 
                                            value={examDateStr} 
                                            onChange={handleDateChange} 
                                            onBlur={() => setIsEditingDate(false)}
                                            className="text-xs border rounded p-1 mt-1"
                                            autoFocus
                                        />
                                    ) : (
                                        <div className="text-xs text-gray-400 flex items-center gap-1 cursor-pointer hover:text-indigo-500" onClick={() => setIsEditingDate(true)}>
                                            Target: {new Date(examDateStr).toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric'})} 
                                            <Icons.Edit />
                                        </div>
                                    )}
                                </div>
                                <div className="h-10 w-px bg-gray-100 mx-2"></div>
                                <button onClick={handleReset} className="text-gray-400 hover:text-red-500 text-xs flex flex-col items-center gap-1 transition-colors">
                                    <Icons.Refresh /> Reset
                                </button>
                            </div>
                        </div>
                        
                        {/* KPI Cards */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                            {/* 1. Readiness */}
                            <div className="bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl p-5 text-white shadow-lg relative overflow-hidden">
                                <div className="relative z-10">
                                    <div className="text-sm font-medium opacity-90 mb-1">ความพร้อมรวม (Weighted Readiness)</div>
                                    <div className="text-4xl font-bold">{totalReadiness.toFixed(2)}%</div>
                                    <div className="w-full bg-black/20 rounded-full h-1.5 mt-3 overflow-hidden">
                                        <div className="bg-white h-full rounded-full" style={{ width: `${totalReadiness}%` }}></div>
                                    </div>
                                </div>
                                <div className="absolute right-0 top-0 opacity-10 transform translate-x-4 -translate-y-4">
                                    <svg width="100" height="100" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
                                </div>
                            </div>

                            {/* 2. Score Dashboard */}
                            <div className="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm flex items-center justify-between relative overflow-hidden">
                                <div>
                                    <div className="text-sm text-gray-500 font-medium mb-1 flex items-center gap-2">
                                        <span className="text-orange-500"><Icons.Trophy /></span>
                                        คะแนนเฉลี่ยล่าสุด (Avg. Score)
                                    </div>
                                    <div className="flex items-baseline gap-2">
                                        <div className="text-4xl font-bold text-gray-800">{averageScore.toFixed(0)}</div>
                                        <div className="text-sm text-gray-400">/ 100 คะแนน</div>
                                    </div>
                                    <div className="text-xs text-gray-400 mt-2">
                                        จาก {subjects.filter(s => s.scoreHistory && s.scoreHistory.length > 0).length} วิชาที่มีประวัติคะแนน
                                    </div>
                                </div>
                                {/* Mini Bar Chart Visualization */}
                                <div className="flex items-end gap-1 h-12 w-32 justify-end">
                                    {subjects.map(s => {
                                        const score = getLatestScore(s);
                                        return (
                                            <div key={s.id} 
                                                 className={`w-2 rounded-t-sm ${score > 0 ? s.color.replace('bg-', 'bg-') : 'bg-gray-100'}`} 
                                                 style={{ height: `${score}%` }}
                                                 title={`${s.name}: ${score}`}
                                            ></div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Subject Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 pb-10">
                        {subjects.map((sub) => {
                            const latestScore = getLatestScore(sub);
                            return (
                                <div 
                                    key={sub.id} 
                                    onClick={() => setSelectedSubject(sub)}
                                    className="group bg-white rounded-xl shadow-sm border border-gray-100 p-5 cursor-pointer hover:shadow-lg hover:border-indigo-100 transition-all duration-300 relative overflow-hidden"
                                >
                                    <div className={`absolute bottom-0 left-0 h-1 ${sub.color}`} style={{ width: `${sub.progress}%` }}></div>

                                    <div className="flex justify-between items-start mb-4">
                                        <div className={`p-2 rounded-lg ${sub.color} bg-opacity-10 text-gray-700`}>
                                            {sub.icon === 'Target' ? <Icons.Target /> : sub.icon === 'Brain' ? <Icons.Brain /> : <Icons.Book />}
                                        </div>
                                        <div className="text-right">
                                            <div className="text-2xl font-bold text-gray-800">{sub.progress}%</div>
                                            <div className="text-[10px] text-gray-400">Complete</div>
                                        </div>
                                    </div>

                                    <h3 className="font-bold text-gray-800 mb-1">{sub.name}</h3>
                                    
                                    {/* Score Badge */}
                                    <div className="flex justify-between items-center mt-3 mb-3 bg-gray-50 p-2 rounded-lg">
                                        <span className="text-xs text-gray-500">Latest Score:</span>
                                        <span className={`text-sm font-bold ${latestScore >= sub.targetScore && latestScore > 0 ? 'text-green-600' : 'text-gray-700'}`}>
                                            {latestScore || '-'}
                                        </span>
                                    </div>

                                    {/* Last Update Footer */}
                                    <div className="flex items-center gap-1 text-[10px] text-gray-400 mt-2 border-t border-gray-50 pt-2">
                                        <Icons.Clock /> 
                                        {sub.lastUpdated 
                                            ? `Update: ${new Date(sub.lastUpdated).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit'})}` 
                                            : 'ยังไม่อัปเดต'}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* Modal */}
                    {selectedSubject && (
                        <SubjectModal 
                            subject={selectedSubject} 
                            onClose={() => setSelectedSubject(null)} 
                            onUpdateTopic={handleUpdateTopic}
                            onAddScore={handleAddScore}
                            onDeleteScore={handleDeleteScore}
                            onUpdateTarget={handleUpdateTarget}
                        />
                    )}

                    <div className="text-center text-xs text-gray-400 pb-8">
                         ข้อมูลจะถูกบันทึกในอุปกรณ์นี้อัตโนมัติ (Local Storage)
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dek71Dashboard />);
    </script>
</body>
</html>
